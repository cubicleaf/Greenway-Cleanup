<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleveland Greenway Cleanup</title>
<meta name="description" content="Join your neighbors for weekly trash cleanup along the Cleveland Greenway in Cleveland, TN.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS VARIABLES
   ============================================ */
:root {
  --cream: #F5F0E8;
  --cream-dark: #E8E0D4;
  --forest: #2D4A2D;
  --forest-light: #3B6A3B;
  --leaf: #4A7C4A;
  --amber: #C49A2A;
  --amber-light: #D4A843;
  --charcoal: #3A3A3A;
  --charcoal-light: #6A6A6A;
  --white: #FFFFFF;
  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --display: 'DM Serif Display', Georgia, serif;
  --radius: 12px;
}

/* ============================================
   RESET
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--charcoal);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  /* Prevent scroll when modal is open */
  overflow-x: hidden;
}

body.modal-open {
  overflow: hidden;
}

/* ============================================
   HERO — full viewport, centered, minimal.
   Title + button + "Just show up." That's it.
   ============================================ */
.hero {
  background: var(--forest);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem 1.5rem;
  position: relative;
  overflow: hidden;
}

/* Subtle gradient overlay */
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 20% 80%, rgba(74, 124, 74, 0.3) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(196, 154, 42, 0.1) 0%, transparent 50%);
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 600px;
}

.hero-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--amber-light);
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fade-in 1s ease 0.3s forwards;
}

.hero h1 {
  font-family: var(--display);
  font-size: clamp(2.2rem, 8vw, 3.5rem);
  font-weight: 400;
  line-height: 1.15;
  margin-bottom: 2rem;
  color: var(--white);
  opacity: 0;
  animation: fade-in 1s ease 0.6s forwards;
}

/* "Just show up." — slides in from the left */
.hero-tagline {
  font-family: var(--display);
  font-size: clamp(1.2rem, 4vw, 1.6rem);
  font-weight: 400;
  font-style: italic;
  color: rgba(245, 240, 232, 0.6);
  margin-bottom: 3rem;
  opacity: 0;
  transform: translateX(-40px);
  animation: slide-in-left 1.2s cubic-bezier(0.25, 0, 0, 1) 1.2s forwards;
}

.hero-cta {
  display: inline-block;
  background: var(--amber);
  color: var(--white);
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 600;
  text-decoration: none;
  padding: 1.1rem 3rem;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  box-shadow: 0 4px 20px rgba(196, 154, 42, 0.3);
  min-height: 54px;
  opacity: 0;
  animation: fade-in 1s ease 1.8s forwards;
}

.hero-cta:hover {
  background: var(--amber-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(196, 154, 42, 0.4);
}

.hero-cta:active {
  transform: translateY(0);
  box-shadow: 0 2px 10px rgba(196, 154, 42, 0.3);
}

/* ============================================
   FOOTER — minimal, at the bottom of the hero
   ============================================ */
.hero-footer {
  position: absolute;
  bottom: 1.5rem;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 1;
  font-size: 0.7rem;
  color: rgba(245, 240, 232, 0.25);
  letter-spacing: 1px;
  opacity: 0;
  animation: fade-in 1s ease 2.5s forwards;
}

.hero-footer a {
  color: rgba(245, 240, 232, 0.35);
  text-decoration: none;
  transition: color 0.3s ease;
}

.hero-footer a:hover {
  color: rgba(245, 240, 232, 0.6);
}

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slide-in-left {
  from {
    opacity: 0;
    transform: translateX(-40px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* ============================================
   MODAL OVERLAY — the dark backdrop behind
   the modal. Clicking it closes the modal.
   ============================================ */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0);
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: flex-end; /* slides up from bottom on mobile */
  pointer-events: none;
  transition: background 0.4s cubic-bezier(0.25, 0, 0, 1);
}

.modal-overlay.active {
  background: rgba(0, 0, 0, 0.6);
  pointer-events: auto;
}

/* ============================================
   MODAL — the signup form container.
   On mobile: 80% of viewport height, slides
   up from bottom.
   On desktop: centered card.
   ============================================ */
.modal {
  background: var(--forest);
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  border-radius: 20px 20px 0 0;
  overflow-y: auto;
  padding: 0;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
  position: relative;
  /* Custom scrollbar inside modal */
  scrollbar-width: thin;
  scrollbar-color: rgba(245, 240, 232, 0.15) transparent;
}

.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: rgba(245, 240, 232, 0.15); border-radius: 3px; }

.modal-overlay.active .modal {
  transform: translateY(0);
}

@media (min-width: 768px) {
  .modal-overlay {
    align-items: center;
  }

  .modal {
    border-radius: 20px;
    max-height: 80vh;
    transform: translateY(30px);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1),
                opacity 0.4s ease;
  }

  .modal-overlay.active .modal {
    transform: translateY(0);
    opacity: 1;
  }
}

/* ============================================
   MODAL HEADER — close button (feather X)
   ============================================ */
.modal-header {
  display: flex;
  justify-content: flex-end;
  padding: 1.2rem 1.2rem 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.modal-close {
  width: 40px;
  height: 40px;
  border: none;
  background: rgba(245, 240, 232, 0.1);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, transform 0.2s ease;
}

.modal-close:hover {
  background: rgba(245, 240, 232, 0.2);
  transform: scale(1.05);
}

.modal-close:active {
  transform: scale(0.95);
}

/* Feather-style X icon using pure CSS */
.modal-close-icon {
  width: 18px;
  height: 18px;
  position: relative;
}

.modal-close-icon::before,
.modal-close-icon::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 18px;
  height: 1.5px;
  background: var(--cream);
  border-radius: 1px;
}

.modal-close-icon::before {
  transform: translate(-50%, -50%) rotate(45deg);
}

.modal-close-icon::after {
  transform: translate(-50%, -50%) rotate(-45deg);
}

/* ============================================
   MODAL BODY — the form content
   ============================================ */
.modal-body {
  padding: 1rem 2rem 2.5rem;
}

.modal-title {
  font-family: var(--display);
  font-size: clamp(1.5rem, 5vw, 2rem);
  color: var(--cream);
  text-align: center;
  margin-bottom: 0.5rem;
}

.modal-sub {
  color: rgba(245, 240, 232, 0.7);
  text-align: center;
  margin-bottom: 2rem;
  font-size: 0.9rem;
}

/* ============================================
   FORM STYLES
   ============================================ */
.form-group {
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: rgba(245, 240, 232, 0.6);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 0.9rem 1rem;
  font-family: var(--sans);
  font-size: 1rem;
  border: 2px solid rgba(245, 240, 232, 0.15);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.07);
  color: var(--cream);
  transition: border-color 0.3s ease, background 0.3s ease;
  min-height: 50px;
}

.form-group input::placeholder {
  color: rgba(245, 240, 232, 0.3);
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--amber);
  background: rgba(255, 255, 255, 0.12);
}

.form-group select {
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23F5F0E8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 1rem center;
  padding-right: 2.5rem;
}

.form-group select option {
  background: var(--forest);
  color: var(--cream);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

@media (max-width: 480px) {
  .form-row {
    grid-template-columns: 1fr;
  }
}

.submit-btn {
  display: block;
  width: 100%;
  background: var(--amber);
  color: var(--white);
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 600;
  padding: 1rem;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 1.5rem;
  transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  box-shadow: 0 4px 15px rgba(196, 154, 42, 0.25);
  min-height: 54px;
}

.submit-btn:hover {
  background: var(--amber-light);
  transform: translateY(-1px);
}

.submit-btn:active {
  transform: translateY(0);
}

.form-note {
  text-align: center;
  font-size: 0.7rem;
  color: rgba(245, 240, 232, 0.4);
  margin-top: 1rem;
}
</style>
</head>
<body>

<!-- ==========================================
     HERO — the entire visible page.
     Title, tagline, one button.
     ========================================== -->
<div class="hero">
  <div class="hero-content">
    <div class="hero-badge">Cleveland, TN</div>
    <h1>Cleveland Greenway Cleanup</h1>
    <p class="hero-tagline">Just show up.</p>
    <button class="hero-cta" id="open-modal">Get Involved</button>
  </div>
  <div class="hero-footer">
    Cleveland Greenway Cleanup &middot; Cleveland, TN
  </div>
</div>

<!-- ==========================================
     MODAL — signup form, slides up smoothly
     ========================================== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <button class="modal-close" id="close-modal" aria-label="Close">
        <div class="modal-close-icon"></div>
      </button>
    </div>
    <div class="modal-body">
      <h2 class="modal-title" id="modal-title">Get Involved</h2>
      <p class="modal-sub">Sign up and we'll email you before each cleanup with the time and meeting spot.</p>

      <form name="greenway-signup" method="POST" data-netlify="true" action="/success.html" netlify-honeypot="bot-field">
        <!-- Honeypot — hidden from humans, catches spam bots -->
        <p style="display:none;">
          <label>Don't fill this out: <input name="bot-field"></label>
        </p>

        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="First name" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Last name">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone (optional)</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
        </div>

        <div class="form-group">
          <label for="howHeard">How'd You Hear About Us?</label>
          <select id="howHeard" name="howHeard">
            <option value="" disabled selected>Choose one...</option>
            <option value="qr-flyer">QR code / flyer on the trail</option>
            <option value="qr-card">Business card</option>
            <option value="friend">A friend told me</option>
            <option value="social">Social media</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit" class="submit-btn">Count Me In</button>
        <p class="form-note">No spam, ever. Just a quick heads-up before each cleanup.</p>
      </form>
    </div>
  </div>
</div>

<!-- ==========================================
     JAVASCRIPT — modal open/close logic
     ========================================== -->
<script>
(function() {
  var overlay = document.getElementById('modal-overlay');
  var modal = document.getElementById('modal');
  var openBtn = document.getElementById('open-modal');
  var closeBtn = document.getElementById('close-modal');

  function openModal() {
    overlay.classList.add('active');
    document.body.classList.add('modal-open');
    // Focus the close button for accessibility
    setTimeout(function() { closeBtn.focus(); }, 500);
  }

  function closeModal() {
    overlay.classList.remove('active');
    document.body.classList.remove('modal-open');
    openBtn.focus();
  }

  // Open on button click
  openBtn.addEventListener('click', openModal);

  // Close on X button click
  closeBtn.addEventListener('click', closeModal);

  // Close on overlay click (but not modal itself)
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      closeModal();
    }
  });

  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      closeModal();
    }
  });
})();
</script>

</body>
</html>
