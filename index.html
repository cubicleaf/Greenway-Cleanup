<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleveland Greenway Cleanup</title>
<meta name="description" content="Join your neighbors for weekly trash cleanup along the Cleveland Greenway in Cleveland, TN.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS VARIABLES — Deep Earth Palette
   ============================================
   Shifted from flat forest green to layered
   earth tones: loam, bark, moss, river stone.
   --loam:         Deep soil brown, primary bg
   --loam-light:   Slightly lighter earth, modal bg
   --bark:         Warm dark brown, near-black
   --moss:         Golden-green, nature accent
   --moss-muted:   Desaturated moss for subtle use
   --river:        Cool blue-gray, water accent
   --amber:        Warm gold, CTA / action color
   --amber-light:  Hover state for amber
   --cream:        Warm off-white, primary text
   --cream-dark:   Muted cream, secondary text
   --sand:         Warm border/divider tone
   ============================================ */
:root {
  --loam: #1E1A14;
  --loam-light: #2A2318;
  --bark: #3D3228;
  --moss: #6B7F4A;
  --moss-muted: #4A5638;
  --river: #3D8FB5;   /* Vibrant stream blue. Bumped from muted
                         #7A9BA5 blue-gray to a saturated but
                         still-natural forest-stream blue. Used
                         in the hero river SVG and the logo badge. */
  --amber: #C49A2A;
  --amber-light: #D4A843;
  --cream: #F5F0E8;
  --cream-dark: #D5CEC2;
  --sand: #8A7D6B;
  --white: #FFFFFF;
  --ink: #1E1A14;        /* Always-dark token (kept for potential future use) */
  --dirt: #6B5538;       /* Rich warm brown — primary CTA background.
                            Replaced amber yellow. Works on both dark loam
                            bg and cream bg. Text on dirt = white/cream,
                            contrast ~7:1 (passes WCAG AAA). */
  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --display: 'DM Serif Display', Georgia, serif;
  --radius: 12px;
}

/* ============================================
   LIGHT MODE OVERRIDES — Field Journal palette
   ============================================
   When <body> has .light-mode, these five
   surface variables flip. Everything downstream
   that uses var(--loam), var(--cream), etc.
   recolors automatically via CSS variable
   inheritance — no other rules need to change.
   Flora stays green on cream (naturalist sketchbook look).
   ============================================ */
body.light-mode {
  --loam:        #D6CBAE;  /* dusty khaki parchment bg — "dirty" light mode.
                              RGB(214,203,174). Muted, earthy, warm. Sits in
                              the same earth-tone family as dark-mode --loam
                              (#1E1A14) and --loam-light (#4A3E32) but at
                              ~76% lightness. Lived-in, not sugary. */
  --loam-light:  #4A3E32;  /* DIRT — modal bg. Darker earthy tone (was cream
                              #EDE6D8). In light mode the modal now reads as a
                              dark-earth card floating on parchment, which pops
                              visually and solves the cream-on-cream contrast
                              collapse for form labels and helper text. */
  --cream:       #2D3A1E;  /* dark moss — primary text */
  --cream-dark:  #3D3228;  /* bark — secondary text */
  --sand:        #6B5E4C;  /* deeper sand for borders on cream */
}

/* When the modal renders in light mode its background flipped to dark dirt,
   so ALL text inside it must flip back to the cream palette. We do this by
   scoping the --cream/--cream-dark/--sand variables INSIDE .modal so every
   descendant using those tokens (title, inputs, labels via rgba fallback)
   renders correctly against the dark surface. This is a contained override —
   outside the modal, light-mode text stays dark moss on parchment as usual. */
body.light-mode .modal {
  --cream:      #F5F0E8;  /* re-pin cream for modal-body text */
  --cream-dark: #D5CEC2;  /* re-pin secondary cream */
  --sand:       rgba(245, 240, 232, 0.25);  /* cream-tinted divider */
}

/* Submit button lift — default --dirt (#6B5538) is nearly the same hue as
   the new #4A3E32 dirt modal bg, so the CTA visually collapses in light mode.
   Swap to a warm tan (#A18A6B) scoped to this context: contrast vs modal bg
   ~4.2:1 (AA), white text on tan ~3:1 (pairs with bold 1.1rem / 17.6px which
   qualifies as "large text" under WCAG — passes AA large text). */
body.light-mode .modal .submit-btn {
  background: #A18A6B;
  box-shadow: 0 4px 15px rgba(161, 138, 107, 0.25);
}
body.light-mode .modal .submit-btn:hover {
  background: #B89E7F;
}

/* ============================================
   GRASS BAND — earthy ground plane behind
   river + flora. Now an SVG element (same
   viewBox as the river) so the top edge can
   follow the exact curve of the stream.
   Top edge = river's upper bank shifted 120
   SVG units upward (1.5 × ~80-unit stream width).
   Fill uses an SVG mask for the fade so the
   solid fill color can be a CSS variable —
   that lets the mode toggle crossfade it.
   ============================================ */
:root {
  --grass-color: #3A5022;   /* dark earthy moss — dark mode */
}
body.light-mode {
  --grass-color: #48642C;   /* slightly brighter — parchment bg */
}

.grass-band {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;              /* behind river SVG (z:0) and all flora (z:0) */
  pointer-events: none;
  overflow: visible;
}

/* SVG path fill uses var(--grass-color) so the
   mode-toggle crossfade catches it */
.grass-band path {
  transition: fill 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* ============================================
   SMOOTH MODE CROSSFADE — 0.6s ease-in-out
   ============================================
   When the toggle fires, listed surfaces
   transition their bg + text + border over
   0.6s with cubic-bezier(0.25, 0.1, 0.25, 1).
   :where() gives zero specificity so any
   element-level transition (button hover, etc.)
   still wins. Matches the playbook's
   "slow and deliberate" principle.
   ============================================ */
:where(body, .hero, .modal, .modal-overlay,
       .hero h1, .hero-tagline, .hero-badge,
       .modal-title, .modal-sub,
       .form-group label, .form-group input, .form-group select,
       .hero-footer, .hero-footer a, .form-note,
       .modal-close, .color-mode-toggle, .grass-band) {
  transition: background-color 0.6s cubic-bezier(0.25, 0.1, 0.25, 1),
              color 0.6s cubic-bezier(0.25, 0.1, 0.25, 1),
              border-color 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* ============================================
   RESET
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--sans);
  background: var(--loam);
  color: var(--cream);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  /* Prevent scroll when modal is open */
  overflow-x: hidden;
}

body.modal-open {
  overflow: hidden;
}

/* ============================================
   HERO — full viewport, centered, minimal.
   Deep earth background with nature SVG art.
   ============================================ */
.hero {
  background: var(--loam);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem 1.5rem 10rem;   /* extra bottom padding shifts the flex
                                    center point upward ~80px on desktop,
                                    clearing the top of the tree canopy */
  position: relative;
  overflow: hidden;
}

/* Warm atmospheric gradient — dark earth bottom,
   hint of moss warmth top-center, faint amber glow.
   These values are tuned for DARK bg. Light-mode
   overrides below remap them to work on cream. */
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(107, 127, 74, 0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 90%, rgba(61, 50, 40, 0.6) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 30%, rgba(196, 154, 42, 0.06) 0%, transparent 40%);
  pointer-events: none;
}

/* Light-mode atmospheric glow — same three radial
   positions but SUBTLER opacities so they whisper
   against cream instead of shouting. Moss is barely
   visible, bark glow in corner is very faint, amber
   stays warm. If these read too strong on cream,
   drop the opacities further. */
body.light-mode .hero::before {
  background: radial-gradient(ellipse at 50% 0%, rgba(107, 127, 74, 0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 90%, rgba(61, 50, 40, 0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 30%, rgba(196, 154, 42, 0.08) 0%, transparent 40%);
}

/* ============================================
   SCENE CONTAINER — holds the river SVG + all
   flora icons. On desktop it fills the hero as
   an absolute overlay. On mobile it locks to a
   landscape aspect ratio so the percentage-based
   positions don't distort on portrait screens.
   ============================================ */
.scene-container {
  /* GROUND BAND — anchored to the bottom of the hero.
     aspect-ratio: 3 / 1 locks the scene to a 3:1 landscape
     shape at every viewport width. This is the key to stable
     tree positioning: a tree's width in vw becomes a known %
     of container height (5vw tree = 15% of container height),
     so each tree's BASE lands in the same spot relative to the
     stream SVG on every screen.
     max-width: 1920px — without this, viewports wider than
     1920px would hit the max-height cap and break the 3:1 ratio
     (container becomes wider than 3:1). That breaks the math:
     trees would render taller as a % of container height than
     predicted, and their BASES would land LOWER than intended —
     potentially on the path. Capping width preserves the ratio
     on every screen; sides beyond 1920px just show the dark
     loam background, which blends naturally with the hero. */
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  top: auto;
  width: 100%;
  max-width: 1920px;
  aspect-ratio: 3 / 1;
  max-height: 640px;
  pointer-events: none;
  z-index: 2;   /* above hero::after (z-index:1) so trees render over the fade */
  overflow: hidden;
  container-type: inline-size;     /* enables `cqw` unit inside — 1cqw = 1% of
                                      THIS container's width, not the viewport.
                                      Flora widths use cqw so tree size tracks
                                      the container, not the viewport. */
  container-name: scene;
}

/* River SVG — fills the scene container */
.hero-bg-art {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 1;
  pointer-events: none;
  z-index: 0;
}

/* ============================================
   SCENE-TO-HERO FADE — lives on .hero::after
   so it can reach ABOVE the scene-container's
   top edge, which ::after on the container
   itself cannot do (overflow:hidden clips it).
   The gradient rises from solid loam at the
   bottom, stays solid through the scene band,
   then dissolves into transparent by the time
   it reaches the text area (~40% from top).
   hero-content is z-index:2, this is z-index:1,
   so text and buttons always render above it.
   ============================================ */
.hero::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 100%;
  background: linear-gradient(
    to top,
    rgba(30, 26, 20, 1)   0%,
    rgba(30, 26, 20, 1)   38%,
    rgba(30, 26, 20, 0)   58%
  );
  z-index: 1;
  pointer-events: none;
}

/* Light-mode version — same shape, parchment tone */
body.light-mode .hero::after {
  background: linear-gradient(
    to top,
    rgba(214, 203, 174, 1)  0%,
    rgba(214, 203, 174, 1)  38%,
    rgba(214, 203, 174, 0)  58%
  );
}

.hero-content {
  position: relative;
  z-index: 3;   /* above scene-container (z-index:2) so text sits on top */
  max-width: 600px;
}

/* ============================================
   FLORA ICONS — nature icons placed along both
   banks of the stream. Each is absolutely
   positioned within the scene container.
   Icons are sorted by top% in the HTML so
   higher-up icons render behind lower ones.
   ============================================ */
.flora-icon {
  position: absolute;
  pointer-events: none;
  z-index: 0;
  width: 5cqw;            /* cqw = % of scene-container width (container query
                             unit). Previously `vw` — but that scales with the
                             viewport even when the container's capped at
                             1920px, so on ultra-wide monitors trees grew past
                             their predicted % of container height and their
                             BASES spilled onto the path. cqw keeps the ratio
                             stable. Individual tree widths in inline styles
                             also use `cqw`. */
  height: auto;
  aspect-ratio: 1;        /* Reserve a 1:1 box BEFORE the SVG loads.
                             Fixes CLS (Cumulative Layout Shift) from
                             108 icons popping into place one by one. */
  opacity: 1;
}

/* ============================================
   MOBILE: scene-container already scales correctly
   via aspect-ratio: 3/1. We just cap max-height
   differently and bump min-width on icons so trees
   don't shrink to invisibility on tiny phones.
   ============================================ */
@media (max-width: 768px) {
  .hero {
    justify-content: flex-start;  /* poster layout: content anchors to the
                                     top, scene fills the bottom — no more
                                     dead gap from vertical centering */
    padding-top: 3.5rem;
    padding-bottom: 2rem;
  }

  .scene-container {
    width: 280%;            /* wider than viewport = zoomed center crop.
                               the diagonal path in the SVG already reads
                               as SE slope — no rotation needed */
    max-width: 900px;
    aspect-ratio: auto;
    height: 240px;
    max-height: 240px;
    transform: translateX(-50%); /* re-center, no rotation */
  }

  .flora-icon {
    min-width: 24px;
    max-width: 52px;        /* second safety net — tree icons never
                               grow past 52px regardless of container */
  }
}

@media (max-width: 480px) {
  .scene-container {
    width: 300%;
    max-width: 900px;
    height: 220px;
    max-height: 220px;
    aspect-ratio: auto;
    transform: translateX(-50%);
  }

  .flora-icon {
    min-width: 20px;
    max-width: 44px;
  }
}

/* ============================================
   LOGO BADGE — compact emblem above the title.
   Trees + river in a circular SVG mark.
   ============================================ */
/* ============================================
   ENTRANCE CASCADE (condensed)
   ============================================
   Original cascade finished at 2.8s — too long
   for a QR-code stranger who'd bounce. Compressed
   to finish by 1.15s while preserving stagger
   feel. Each element starts ~0.08–0.15s after
   the one before. CTA appears by 0.95s.
   Durations: 0.5s per item (was 1.0–1.2s).
   ============================================ */
.hero-logo {
  width: 120px;
  height: 120px;
  margin: 0 auto 1.5rem;
  display: block;
  opacity: 0;
  animation: fade-in 0.5s ease 0.05s forwards;
}

.hero-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sand);
  margin-bottom: 1.5rem;
  opacity: 0;
  animation: fade-in 0.5s ease 0.12s forwards;
}

.hero h1 {
  font-family: var(--display);
  font-size: clamp(2.2rem, 8vw, 3.5rem);
  font-weight: 400;
  line-height: 1.15;
  margin-bottom: 2rem;
  color: var(--cream);
  opacity: 0;
  animation: fade-in 0.5s ease 0.2s forwards;
}

/* "Just show up." — slides in from the left.
   Shorter slide distance (was -40px, now -24px)
   so the 0.5s duration still feels gentle. */
.hero-tagline {
  font-family: var(--display);
  font-size: clamp(1.2rem, 4vw, 1.6rem);
  font-weight: 400;
  font-style: italic;
  color: rgba(245, 240, 232, 0.6);
  margin-bottom: 3rem;
  opacity: 0;
  transform: translateX(-24px);
  animation: slide-in-left 0.55s cubic-bezier(0.25, 0.1, 0.25, 1) 0.35s forwards;
}

/* ============================================
   PRIMARY CTA — dirt-colored pill button.
   ============================================
   Background: --dirt (#6B5538, tilled earth brown).
   Text: white (~7:1 contrast on dirt — passes AAA).
   Box-shadow: faint amber halo keeps the amber
     gradient warmth feeling intentional.
   Hover: brightens the dirt by ~12% via color-mix,
     lifts 2px, glow deepens.
   Press: scale(0.95) per playbook pattern.
   Entrance: 0.5s fade at 0.45s delay — visible
     by 0.95s, fast enough for a QR stranger.
   ============================================ */
.hero-cta {
  display: inline-block;
  background: var(--dirt);
  color: var(--white);
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 600;
  text-decoration: none;
  padding: 1.1rem 3rem;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  box-shadow: 0 4px 20px rgba(196, 154, 42, 0.25);
  min-height: 54px;
  opacity: 0;
  animation: fade-in 0.5s ease 0.45s forwards;
}

.hero-cta:hover {
  /* color-mix lightens the dirt by 12% toward cream without hardcoding a hex */
  background: color-mix(in srgb, var(--dirt) 88%, var(--cream));
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(196, 154, 42, 0.35);
}

.hero-cta:active {
  transform: scale(0.95);
  box-shadow: 0 2px 10px rgba(196, 154, 42, 0.25);
}

/* ============================================
   FOOTER — minimal, at the bottom of the hero
   ============================================ */
.hero-footer {
  position: absolute;
  bottom: 1.5rem;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 3;   /* matches hero-content, above scene-container */
  font-size: 0.7rem;
  color: rgba(245, 240, 232, 0.18);
  letter-spacing: 1px;
  opacity: 0;
  animation: fade-in 0.5s ease 0.65s forwards;
}

.hero-footer a {
  color: rgba(245, 240, 232, 0.25);
  text-decoration: none;
  transition: color 0.3s ease;
}

.hero-footer a:hover {
  color: rgba(245, 240, 232, 0.5);
}

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slide-in-left {
  from {
    opacity: 0;
    transform: translateX(-40px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* ============================================
   COLOR MODE TOGGLE — top-right corner
   ============================================
   A fixed 44×44 circular button with a sun or
   moon SVG inside. Sits above hero content so
   it's always reachable, below modal z-index
   so it disappears when the modal is open.
   The two SVGs inside are both rendered;
   CSS hides whichever one doesn't match the
   current mode. This avoids any JS-side icon
   swapping and keeps things declarative.
   ============================================ */
.color-mode-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  width: 44px;
  height: 44px;
  border: 1px solid rgba(245, 240, 232, 0.15);
  background: rgba(245, 240, 232, 0.06);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cream);
  z-index: 100;
  opacity: 0;
  animation: fade-in 0.5s ease 0.7s forwards;
  /* Hover and press feel */
  transition: background 0.3s ease, border-color 0.3s ease,
              color 0.6s cubic-bezier(0.25, 0.1, 0.25, 1),
              transform 0.2s ease;
}

.color-mode-toggle:hover {
  background: rgba(245, 240, 232, 0.12);
  border-color: rgba(245, 240, 232, 0.3);
}

.color-mode-toggle:active {
  transform: scale(0.92);   /* playbook press state */
}

/* On cream bg the outline needs slightly more
   contrast so the button still looks like a button */
body.light-mode .color-mode-toggle {
  border-color: rgba(30, 26, 20, 0.2);
  background: rgba(30, 26, 20, 0.04);
}

body.light-mode .color-mode-toggle:hover {
  background: rgba(30, 26, 20, 0.08);
  border-color: rgba(30, 26, 20, 0.35);
}

/* Show the right icon for the current mode.
   Dark mode → the moon is visible (tap to go light).
   Light mode → the sun is visible (tap to go dark). */
.color-mode-toggle .icon-sun  { display: none; }
.color-mode-toggle .icon-moon { display: block; }

body.light-mode .color-mode-toggle .icon-sun  { display: block; }
body.light-mode .color-mode-toggle .icon-moon { display: none; }

/* ============================================
   MODAL OVERLAY — the dark backdrop behind
   the modal. Clicking it closes the modal.
   ============================================ */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0);
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: flex-end; /* slides up from bottom on mobile */
  pointer-events: none;
  transition: background 0.4s cubic-bezier(0.25, 0, 0, 1);
}

.modal-overlay.active {
  background: rgba(20, 16, 12, 0.7);
  pointer-events: auto;
}

/* ============================================
   MODAL — the signup form container.
   On mobile: 80% of viewport height, slides
   up from bottom.
   On desktop: centered card.
   ============================================ */
.modal {
  background: var(--loam-light);
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  border-radius: 20px 20px 0 0;
  overflow-y: auto;
  padding: 0;
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
  position: relative;
  /* Custom scrollbar inside modal */
  scrollbar-width: thin;
  scrollbar-color: rgba(245, 240, 232, 0.15) transparent;
}

.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: rgba(245, 240, 232, 0.15); border-radius: 3px; }

.modal-overlay.active .modal {
  transform: translateY(0);
}

@media (min-width: 768px) {
  .modal-overlay {
    align-items: center;
  }

  .modal {
    border-radius: 20px;
    max-height: 80vh;
    transform: translateY(30px);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1),
                opacity 0.4s ease;
  }

  .modal-overlay.active .modal {
    transform: translateY(0);
    opacity: 1;
  }
}

/* ============================================
   MODAL HEADER — close button (feather X)
   ============================================ */
.modal-header {
  display: flex;
  justify-content: flex-end;
  padding: 1.2rem 1.2rem 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.modal-close {
  width: 40px;
  height: 40px;
  border: none;
  background: rgba(245, 240, 232, 0.1);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, transform 0.2s ease;
}

.modal-close:hover {
  background: rgba(245, 240, 232, 0.2);
  transform: scale(1.05);
}

.modal-close:active {
  transform: scale(0.95);
}

/* Feather-style X icon using pure CSS */
.modal-close-icon {
  width: 18px;
  height: 18px;
  position: relative;
}

.modal-close-icon::before,
.modal-close-icon::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 18px;
  height: 1.5px;
  background: var(--cream);
  border-radius: 1px;
}

.modal-close-icon::before {
  transform: translate(-50%, -50%) rotate(45deg);
}

.modal-close-icon::after {
  transform: translate(-50%, -50%) rotate(-45deg);
}

/* ============================================
   MODAL BODY — the form content
   ============================================ */
.modal-body {
  padding: 1rem 2rem 2.5rem;
}

.modal-title {
  font-family: var(--display);
  font-size: clamp(1.5rem, 5vw, 2rem);
  color: var(--cream);
  text-align: center;
  margin-bottom: 0.5rem;
}

.modal-sub {
  color: rgba(245, 240, 232, 0.7);
  text-align: center;
  margin-bottom: 2rem;
  font-size: 0.9rem;
}

/* ============================================
   FORM STYLES
   ============================================ */
.form-group {
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: rgba(245, 240, 232, 0.6);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 0.9rem 1rem;
  font-family: var(--sans);
  font-size: 1rem;
  border: 2px solid rgba(245, 240, 232, 0.15);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.07);
  color: var(--cream);
  transition: border-color 0.3s ease, background 0.3s ease;
  min-height: 50px;
}

.form-group input::placeholder {
  color: rgba(245, 240, 232, 0.3);
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--amber);
  background: rgba(255, 255, 255, 0.12);
}

.form-group select {
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23F5F0E8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 1rem center;
  padding-right: 2.5rem;
}

.form-group select option {
  background: var(--loam-light);
  color: var(--cream);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

@media (max-width: 480px) {
  .form-row {
    grid-template-columns: 1fr;
  }
}

.submit-btn {
  display: block;
  width: 100%;
  background: var(--dirt);
  color: var(--white);
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 600;
  padding: 1rem;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 1.5rem;
  transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  box-shadow: 0 4px 15px rgba(196, 154, 42, 0.20);
  min-height: 54px;
}

.submit-btn:hover {
  background: color-mix(in srgb, var(--dirt) 88%, var(--cream));
  transform: translateY(-1px);
}

.submit-btn:active {
  transform: scale(0.95);
}

.form-note {
  text-align: center;
  font-size: 0.7rem;
  color: rgba(245, 240, 232, 0.4);
  margin-top: 1rem;
}
</style>
</head>

<!-- ==========================================

  <div class="scene-container">

    <!-- Grass ground plane — SVG matches the river's viewBox exactly
         so the top edge tracks the stream curve.
         Top bank of river: M-10,460 ... 1010,935
         Offset 120 SVG units upward (1.5 × 80-unit stream width):
         M-10,340 ... 1010,815
         Fill: var(--grass-color) behind an opacity mask so the
         mode-toggle crossfade works cleanly. -->
    <svg class="grass-band" viewBox="0 0 1000 1000"
         preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <!-- Vertical Gaussian blur — the only technique that creates a
             fade which actually follows the curved edge. A gradient
             measures from a fixed y-coordinate, so the right side of
             the curve (which sits much lower in the SVG) is already
             near-opaque before the fade can start. Blur works
             differently: it spreads the fill colour outward from
             whatever edge the shape has, so the fade tracks the curve
             exactly. stdDeviation="0 30": no horizontal spread, 30
             SVG-units vertical spread (≈ 3% of the 1000-unit height).
             filter region y="-10%" height="120%" gives the blur
             room to expand above the top edge without clipping. -->
        <filter id="grassBlur" x="0" y="-10%" width="100%" height="120%"
                color-interpolation-filters="linearRGB">
          <feGaussianBlur stdDeviation="0 30"/>
        </filter>
      </defs>
      <!-- opacity="0.93": keeps the grass rich but not poster-paint flat.
           The blur softens the top ~90 SVG units (3× stdDeviation)
           above and below the curved edge; the interior stays solid. -->
      <path fill="var(--grass-color)"
            filter="url(#grassBlur)"
            opacity="0.93"
            d="M-10,340

               C380,560 470,560 550,560
               C630,560 720,720 800,750
               C880,780 970,815 1010,815

<!-- ==========================================
     JAVASCRIPT — modal open/close logic
     ========================================== -->
<script>
(function() {
  /* ---- Color mode toggle ---- */
  /*
     Reads the user's saved preference from
     localStorage (a tiny storage area in the
     browser that persists between visits). If
     they previously chose 'light', apply it
     immediately on page load so they never see
     a flash of dark content. If no preference
     is saved, default to dark.

     Clicking the toggle flips the mode, saves
     the choice, and updates the aria-label +
     aria-pressed so screen readers know what
     state changed.
  */
  var modeToggle = document.getElementById('color-mode-toggle');
  var STORAGE_KEY = 'gwc-color-mode';

  function applyMode(mode) {
    if (mode === 'light') {
      document.body.classList.add('light-mode');
      modeToggle.setAttribute('aria-label', 'Switch to dark mode');
      modeToggle.setAttribute('aria-pressed', 'true');
    } else {
      document.body.classList.remove('light-mode');
      modeToggle.setAttribute('aria-label', 'Switch to light mode');
      modeToggle.setAttribute('aria-pressed', 'false');
    }
  }

  // On load: read saved preference, apply it
  var saved = null;
  try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) { /* storage blocked */ }
  if (saved === 'light') applyMode('light');

  modeToggle.addEventListener('click', function() {
    var isLight = document.body.classList.contains('light-mode');
    var next = isLight ? 'dark' : 'light';
    applyMode(next);
    try { localStorage.setItem(STORAGE_KEY, next); } catch (e) { /* ignore */ }
  });

  /* ---- Modal logic ---- */
  var overlay = document.getElementById('modal-overlay');
  var modal = document.getElementById('modal');
  var openBtn = document.getElementById('open-modal');
  var closeBtn = document.getElementById('close-modal');

  function openModal() {
    overlay.classList.add('active');
    document.body.classList.add('modal-open');
    // Focus the close button for accessibility
    setTimeout(function() { closeBtn.focus(); }, 500);
  }

  function closeModal() {
    overlay.classList.remove('active');
    document.body.classList.remove('modal-open');
    openBtn.focus();
  }

  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      closeModal();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) {
      closeModal();
    }
  });

})();
</script>
