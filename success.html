<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In — Cleveland Greenway Cleanup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: #2D4A2D;
  color: #F5F0E8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 440px;
  opacity: 0;
  animation: fade-up 1s ease 0.2s forwards;
}

h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: clamp(1.8rem, 6vw, 2.5rem);
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 1rem;
  color: #FFFFFF;
}

p {
  font-size: 1rem;
  color: rgba(245, 240, 232, 0.7);
  line-height: 1.6;
  margin-bottom: 2rem;
}

a {
  display: inline-block;
  color: #D4A843;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.9rem;
  padding: 0.8rem 2rem;
  border: 2px solid rgba(212, 168, 67, 0.3);
  border-radius: 50px;
  transition: all 0.3s ease;
}

a:hover {
  background: rgba(212, 168, 67, 0.1);
  border-color: rgba(212, 168, 67, 0.6);
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="container">
  <h1>Many hands make light work.</h1>
  <p>Thanks. We'll send you an email before the next cleanup with the time and meeting spot.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
